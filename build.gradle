plugins {
    id 'java-gradle-plugin'
    id 'maven-publish'
    id 'co.uzzu.dotenv.gradle' version '4.0.0'
}

group = 'io.infracheck'
version = '1.0.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    // Gradle API
    compileOnly gradleApi()

    // 1. Core 모듈의 의존성들 (통합됨)
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.yaml:snakeyaml:2.2'
    implementation 'com.github.javaparser:javaparser-core:3.25.8'
    implementation 'org.slf4j:slf4j-api:2.0.7'

    // 2. Spring Boot Starter 의존성들 (통합됨)
    compileOnly 'org.springframework.boot:spring-boot-starter:3.1.0'
    compileOnly 'org.springframework.boot:spring-boot-configuration-processor:3.1.0'

    // 3. Maven Plugin 의존성들 (통합됨)
    compileOnly 'org.apache.maven:maven-plugin-api:3.9.0'
    compileOnly 'org.apache.maven.plugin-tools:maven-plugin-annotations:3.9.0'
    compileOnly 'org.apache.maven:maven-project:2.2.1'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'com.pholser:junit-quickcheck-core:1.0'
    testImplementation 'com.pholser:junit-quickcheck-generators:1.0'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.1.0'
}

gradlePlugin {
    plugins {
        infrastructureAnalyzer {
            id = 'io.infracheck.infrastructure-analyzer'
            implementationClass = 'io.infracheck.gradle.plugin.InfrastructureAnalyzerPlugin'
        }
    }
}

publishing {
    publications {
        gpr(MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/GeonDev/Infrastructure-Analyzer-Plugin")
            credentials {
                // 플러그인이 .env 파일의 변수들을 project.findProperty()로 자동 매핑해줍니다.
                // 시스템 환경 변수가 있으면 우선적으로 사용됩니다.
                username = System.getenv("GITHUB_ACTOR") ?: project.findProperty("GITHUB_ACTOR") ?: project.findProperty("gpr.user")
                password = System.getenv("GITHUB_TOKEN") ?: project.findProperty("GITHUB_TOKEN") ?: project.findProperty("gpr.key")
            }
        }
    }
}
